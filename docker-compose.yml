name: sakunagraph

services:
  gateway:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${SAKUNAGRAPH_PORT:-8080}:8080"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      target: runtime
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      ORIGIN: ${ORIGIN:-http://localhost:8080}
      HOST_HEADER: x-forwarded-host
      PROTOCOL_HEADER: x-forwarded-proto
      PUBLIC_API_BASE_URL: ""
      PUBLIC_ASK_STREAMING_ENABLED: ${PUBLIC_ASK_STREAMING_ENABLED:-true}
    expose:
      - "3000"

  api:
    build:
      context: ./api
    restart: unless-stopped
    environment:
      CORS_ORIGINS: '["${ORIGIN:-http://localhost:8080}"]'
      GRAPHDB_ENDPOINT: ${GRAPHDB_ENDPOINT:-http://host.docker.internal:7200/repositories/SakunaGraph}
      LOCAL_LLM_BASE_URL: ${LOCAL_LLM_BASE_URL:-http://host.docker.internal:1234}
      LOCAL_LLM_CHAT_PATH: ${LOCAL_LLM_CHAT_PATH:-/api/v1/chat}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-google/gemma-4-e4b}
      LOCAL_LLM_TIMEOUT: ${LOCAL_LLM_TIMEOUT:-120}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "8000"
